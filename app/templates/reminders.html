{% extends "base.html" %}
{% block content %}
<div class="grid gap-8 lg:grid-cols-[420px_minmax(0,1fr)]">
  <section class="rounded-[28px] bg-white p-8 shadow-sm">
    <p class="text-xs uppercase tracking-[0.24em] text-[#3c6842]/70">创建提醒</p>
    <form method="post" action="/api/reminders" class="mt-6 space-y-4" data-api-form="reminders">
      <input type="hidden" name="user_id" value="{{ user_id }}">
      <div>
        <label class="mb-2 block text-sm font-semibold">标题</label>
        <input name="title" class="w-full rounded-2xl border-0 bg-[#f4f4ef] px-4 py-3" value="服药提醒">
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold">内容</label>
        <input name="content" class="w-full rounded-2xl border-0 bg-[#f4f4ef] px-4 py-3" value="晚上吃药">
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold">时间</label>
        <input name="schedule_time" class="w-full rounded-2xl border-0 bg-[#f4f4ef] px-4 py-3" value="20:00">
      </div>
      <button class="rounded-full bg-[#3c6842] px-6 py-3 font-semibold text-[#e4ffe2]">创建提醒</button>
    </form>
  </section>
  <section class="rounded-[28px] bg-white p-8 shadow-sm">
    <p class="text-xs uppercase tracking-[0.24em] text-[#3c6842]/70">提醒列表</p>
    <div class="mt-6 space-y-4" data-reminder-list>
      {% for reminder in reminders %}
      <div class="rounded-2xl bg-[#f4f4ef] px-4 py-4" data-reminder-card data-reminder-id="{{ reminder.id }}">
        <div class="mb-3 flex items-center justify-between">
          <p class="text-xs font-semibold tracking-[0.2em] text-[#5c605a]">状态</p>
          <span
            class="rounded-full px-3 py-1 text-xs font-semibold {% if reminder.status == 'active' %}bg-[#e8f7ea] text-[#2f6d3a]{% else %}bg-[#fff1ef] text-[#9f403d]{% endif %}"
            data-reminder-status
          >
            {{ reminder.status }}
          </span>
        </div>
        <div>
          <p class="font-semibold">{{ reminder.target_name }}</p>
          <p class="text-sm text-[#5c605a]">{{ reminder.local_time or '-' }}</p>
        </div>
        <div class="mt-3 flex items-center justify-between gap-3">
          <p class="text-sm text-[#3c6842]">{{ reminder.metadata.content if reminder.metadata else '' }}</p>
          <div class="flex items-center gap-2">
            <button
              type="button"
              class="rounded-full px-4 py-2 text-sm font-semibold {% if reminder.status == 'active' %}bg-[#fff1ef] text-[#9f403d]{% else %}bg-[#eef8ef] text-[#305c37]{% endif %}"
              data-toggle-reminder
              data-reminder-id="{{ reminder.id }}"
              data-enabled="{% if reminder.status == 'active' %}false{% else %}true{% endif %}"
            >
              {% if reminder.status == 'active' %}暂停{% else %}启用{% endif %}
            </button>
            <button
              type="button"
              class="rounded-full bg-white px-4 py-2 text-sm font-semibold text-[#9f403d]"
              data-delete-reminder
              data-user-id="{{ user_id }}"
              data-reminder-id="{{ reminder.id }}"
            >
              删除
            </button>
          </div>
        </div>
      </div>
      {% else %}
      <p class="text-sm text-[#5c605a]" data-reminder-empty-state>还没有提醒，先创建一个吧。</p>
      {% endfor %}
    </div>
    <template data-reminder-empty-state-template>
      <p class="text-sm text-[#5c605a]" data-reminder-empty-state>还没有提醒，先创建一个吧。</p>
    </template>
  </section>
</div>
{% endblock %}
