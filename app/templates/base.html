<!DOCTYPE html>
<html lang="zh-CN" data-app-version="{{ asset_version }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} - Health Copilot</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Manrope', sans-serif; background: #faf9f5; color: #2f342e; }
    .glass { background: rgba(250, 249, 245, 0.82); backdrop-filter: blur(18px); }
    .nav-link { color: rgba(47, 52, 46, 0.6); }
    .nav-link.active { color: #3c6842; background: rgba(255,255,255,0.65); border-right: 4px solid #3c6842; }
  </style>
  <script defer src="/static/js/app.js?v={{ asset_version }}"></script>
</head>
<body class="min-h-screen">
  <div class="flex min-h-screen">
    {% set nav_query = "?user_id=" ~ (user_id or "demo-user") %}
    {% if session_id %}
      {% set nav_query = nav_query ~ "&session_id=" ~ session_id %}
    {% endif %}
    <aside class="w-72 bg-[#edeee8] px-6 py-8">
      <div class="mb-10">
        <h1 class="text-xl font-bold">Health Copilot</h1>
        <p class="text-xs uppercase tracking-[0.25em] text-[#3c6842] mt-1">The Digital Sanctuary</p>
      </div>
      <nav class="space-y-2">
        <a href="/copilot{{ nav_query }}" class="nav-link {% if active_nav == 'copilot' %}active{% endif %} block rounded-xl px-4 py-3 font-semibold">Copilot</a>
        <a href="/profile{{ nav_query }}" class="nav-link {% if active_nav == 'profile' %}active{% endif %} block rounded-xl px-4 py-3 font-semibold">健康档案</a>
        <a href="/records{{ nav_query }}" class="nav-link {% if active_nav == 'records' %}active{% endif %} block rounded-xl px-4 py-3 font-semibold">记录录入</a>
        <a href="/reminders{{ nav_query }}" class="nav-link {% if active_nav == 'reminders' %}active{% endif %} block rounded-xl px-4 py-3 font-semibold">提醒中心</a>
      </nav>
    </aside>
    <main class="flex-1">
      <header class="glass sticky top-0 z-10 flex items-center justify-between px-10 py-6">
        <div>
          <p class="text-xs uppercase tracking-[0.24em] text-[#3c6842]/70">Health Copilot</p>
          <h2 class="text-3xl font-extrabold tracking-tight">{{ page_title }}</h2>
        </div>
      </header>
      <section class="px-10 py-10">
        <div id="page-status" class="mb-6 hidden rounded-2xl px-4 py-3 text-sm font-medium"></div>
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>
</body>
</html>
